<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRN MANAGER | Labs Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #4285f4; /* Google Blue */
            --text-main: #ffffff;
            --text-dim: #9aa0a6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 50% -10%, #1a1a1a, #000 70%);
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Navigation / Header --- */
        nav {
            max-width: 1200px;
            margin: 20px auto 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: clamp(40px, 8vw, 64px);
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .sub-title {
            color: var(--accent);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 4px;
            font-weight: 600;
        }

        /* --- Bento Style Video Section --- */
        .video-wrapper {
            max-width: 900px;
            margin: 0 auto 50px;
            width: 100%;
            background: var(--glass);
            padding: 15px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 30px;
        }

        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* --- Bento Grid --- */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: minmax(350px, auto);
            gap: 20px;
            width: 100%;
            max-width: 1250px;
            margin: 0 auto;
        }

        .card {
            background: var(--glass);
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Bento variation: Every 4th card is wider */
        @media (min-width: 900px) {
            .card:nth-child(4n+1) { grid-column: span 2; }
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 250px;
            border-radius: 0 0 35px 35px;
            background-color: #0a0a0a;
        }

        .info-box {
            padding: 25px;
            order: -1; /* Text appears above image in bento style */
        }

        .title-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
        }

        /* --- Labs Style Buttons --- */
        .btn-group { display: flex; gap: 12px; }
        
        .copy-btn, .download-btn {
            flex: 1; padding: 12px; font-size: 13px; font-weight: 600;
            cursor: pointer; border-radius: 50px;
            transition: all 0.3s; font-family: inherit;
            text-align: center; text-decoration: none;
        }

        .copy-btn {
            background: #ffffff; color: #000; border: none;
        }

        .copy-btn:hover { background: var(--accent); color: white; }

        .download-btn {
            background: rgba(255, 255, 255, 0.1); color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .download-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .copied { background: #34a853 !important; color: white !important; }

        #loader { text-align: center; color: var(--text-dim); margin: 40px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 40px; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <span class="sub-title">Experimental Studio</span>
        <h1>PROMPT STUDIO</h1>
    </nav>

    <div class="video-wrapper">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/_IFRPijPuVc?rel=0" title="Tutorial" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <div id="loader">Initializing Lab Gallery...</div>

    <div class="container" id="gallery"></div>

    <script>
        // Google Sheet Config
        const sheetID = '15wUCjsVJRv7R8wT4xrd9e3xV5UWhub04suXCfK8lFik';
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadData() {
            try {
                const response = await fetch(url);
                const data = await response.text();
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                const reversedRows = [...rows].reverse();
                document.getElementById('loader').style.display = 'none';
                
                let html = '';
                reversedRows.forEach((row, index) => {
                    if (!row.c || !row.c[2] || !row.c[2].v || row.c[2].v === "" || row.c[2].v === "ImageURL") return;

                    const title = row.c[0] ? row.c[0].v : 'AI Generation';
                    const promptRaw = row.c[1] ? row.c[1].v : '';
                    const promptEncoded = btoa(unescape(encodeURIComponent(promptRaw)));
                    
                    let fileId = "";
                    let originalUrl = row.c[2].v;
                    let displayImg = originalUrl;
                    let downloadUrl = originalUrl;

                    if (originalUrl.includes("drive.google.com")) {
                        if (originalUrl.includes("/d/")) fileId = originalUrl.split('/d/')[1].split('/')[0];
                        else if (originalUrl.includes("id=")) fileId = originalUrl.split('id=')[1].split('&')[0];
                        
                        displayImg = `https://lh3.googleusercontent.com/u/0/d/${fileId}=s1000`; // High Quality
                        downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
                    }

                    html += `
                        <div class="card" style="animation-delay: ${index * 0.1}s">
                            <div class="info-box">
                                <div class="title-text">${title}</div>
                                <div class="btn-group">
                                    <button class="copy-btn" onclick="copyFromBase64(this, '${promptEncoded}')">Copy Prompt</button>
                                    <a href="${downloadUrl}" target="_blank" class="download-btn">Get Art</a>
                                </div>
                            </div>
                            <img src="${displayImg}" alt="${title}" loading="lazy" onerror="this.parentElement.style.display='none'">
                        </div>`;
                });
                document.getElementById('gallery').innerHTML = html;
            } catch (e) {
                document.getElementById('loader').innerText = "Lab sync failed. Please check connection.";
            }
        }

        function copyFromBase64(button, encodedText) {
            const decodedText = decodeURIComponent(escape(atob(encodedText)));
            navigator.clipboard.writeText(decodedText).then(() => {
                const originalText = button.innerText;
                button.innerText = "✓ Copied";
                button.classList.add('copied');
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove('copied');
                }, 2000);
            });
        }

        loadData();
    </script>
</body>
</html>
