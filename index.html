<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Studio | JRN STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 50px; color: var(--accent); letter-spacing: 4px; margin-bottom: 40px; }

        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .prompt-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .prompt-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .image-container {
            width: 100%;
            height: 350px;
            background: #000;
        }

        .image-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .card-content { padding: 20px; }
        
        .prompt-text {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
            border: 1px inset var(--border);
            max-height: 80px;
            overflow-y: auto;
        }

        .copy-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        #loader { margin-top: 100px; color: var(--accent); letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>PROMPT STUDIO</h1>

    <div id="loader">LOADING PROMPTS...</div>
    <div id="promptGrid" class="prompt-grid"></div>

    <script>
        const sheetID = '15wUCjsVJRv7R8wT4xrd9e3xV5UWhub04suXCfK8lFik';
        const gid = '0'; // Sheet 1 এর GID সাধারণত 0 হয়
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&gid=${gid}`;

        async function loadPrompts() {
            try {
                const response = await fetch(url);
                const data = await response.text();
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;

                const grid = document.getElementById('promptGrid');
                document.getElementById('loader').style.display = 'none';

                rows.forEach((row, index) => {
                    if (index === 0) return; // Skip Header
                    
                    const title = row.c[0] ? row.c[0].v : 'AI Art';
                    const prompt = row.c[1] ? row.c[1].v : '';
                    const imageUrl = row.c[2] ? row.c[2].v : '';

                    if (!imageUrl) return; // ইমেজ না থাকলে কার্ড দেখাবে না

                    const card = document.createElement('div');
                    card.className = 'prompt-card';
                    card.innerHTML = `
                        <div class="image-container">
                            <img src="${imageUrl}" alt="${title}">
                        </div>
                        <div class="card-content">
                            <h3 style="margin: 0 0 10px 0; font-size: 18px;">${title}</h3>
                            <div class="prompt-text" id="p${index}">${prompt}</div>
                            <button class="copy-btn" onclick="copyPrompt('p${index}')">Copy Prompt</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerText = "ERROR LOADING PROMPTS.";
            }
        }

        function copyPrompt(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Prompt Copied!");
            });
        }

        window.onload = loadPrompts;
    </script>
</body>
</html>
